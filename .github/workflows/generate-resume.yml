name: Generate Resume & Deploy Site

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow committing the PDF back, and deploying to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # 1. Generate the resume PDF FIRST so the published site always
      #    contains the resume that matches the current site content.
      - name: Generate resume PDF
        run: python scripts/generate_resume.py

      # 2. Commit the regenerated PDF back to the repo so it stays in
      #    version control. [skip ci] prevents this commit from
      #    re-triggering the workflow.
      - name: Commit and push updated resume
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Misc/resume.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate resume from portfolio [skip ci]"
          git push

      # 3. Only after the resume exists, publish the site (which now
      #    includes the freshly generated Misc/resume.pdf).
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
